version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hoshino-postgres
    environment:
      POSTGRES_USER: hoshino
      POSTGRES_PASSWORD: hoshino_pass_dev
      POSTGRES_DB: hoshino_auth
      POSTGRES_INITDB_ARGS: "-c client_encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hoshino-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hoshino -d hoshino_auth"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hoshino-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hoshino-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  hoshino-backend:
    build:
      context: ./Hoshino-Backend
      dockerfile: Dockerfile
    container_name: hoshino-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_USER: hoshino
      DB_PASSWORD: hoshino_pass_dev
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: hoshino_auth
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PHONE_NUMBER: ${PHONE_NUMBER:-1234567890}
    ports:
      - "3000:3000"
    volumes:
      - ./Hoshino-Backend:/app
      - /app/node_modules
    networks:
      - hoshino-network

volumes:
  postgres_data:
  redis_data:

networks:
  hoshino-network:
    driver: bridge
